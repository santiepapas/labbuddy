<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabBuddy — Microbiology Study Companion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0a1d;--surface:#1a1530;--card:#2a2345;--accent:#e879f9;--accent2:#c084fc;--green:#34d399;--red:#fb7185;--yellow:#fbbf24;--cyan:#22d3ee;--orange:#fb923c;--text:#f8fafc;--muted:#a5b4cb;--border:#3b3260}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:16px}
header{text-align:center;padding:24px 0 16px}
header h1{font-size:2rem;background:linear-gradient(135deg,var(--accent),#38bdf8,var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--muted);margin-top:4px;font-size:.9rem}
nav{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;margin:16px 0;padding:8px;background:var(--surface);border-radius:12px;position:sticky;top:0;z-index:100}
nav button{padding:9px 14px;border:none;border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem;font-weight:500;transition:.2s}
nav button:hover{color:var(--text);background:var(--card)}
nav button.active{background:var(--accent);color:#fff}
.section{display:none;animation:fadeIn .3s}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:var(--surface);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--border)}
.card h3{color:var(--accent2);margin-bottom:8px;font-size:1.1rem}
.card p,.card li{color:var(--muted);line-height:1.6;font-size:.93rem}
.card ul{padding-left:20px;margin-top:6px}
.search-box{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1rem;margin-bottom:16px;outline:none;position:sticky;top:56px;z-index:90}
.search-box:focus{border-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.org-card{background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border);cursor:pointer;transition:.2s}
.org-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.org-card h4{color:var(--accent2);font-size:1rem}
.org-card .type{font-size:.75rem;color:var(--green);background:rgba(52,211,153,.15);padding:2px 8px;border-radius:4px;display:inline-block;margin:4px 0}
.org-card p{color:var(--muted);font-size:.85rem;margin-top:4px}
.detail-view{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border)}
.detail-view h2{color:var(--accent2);margin-bottom:4px}
.detail-view .badge{display:inline-block;font-size:.8rem;padding:2px 10px;border-radius:6px;margin:4px 4px 12px 0}
.detail-view table{width:100%;border-collapse:collapse;margin:12px 0}
.detail-view th,.detail-view td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-size:.9rem}
.detail-view th{color:var(--accent2);font-weight:600}
.detail-view td{color:var(--muted)}
.back-btn{background:var(--card);color:var(--text);border:none;padding:10px 18px;border-radius:8px;cursor:pointer;margin-bottom:16px;font-size:.9rem;min-height:44px}
.back-btn:hover{background:var(--accent)}
.quiz-box{text-align:center;padding:20px}
.quiz-box h3{font-size:1.15rem;margin-bottom:20px;color:var(--text)}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:600px;margin:0 auto}
.quiz-option{padding:14px;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);cursor:pointer;font-size:.95rem;transition:.2s;text-align:left;min-height:48px}
.quiz-option:hover{border-color:var(--accent)}
.quiz-option.correct{border-color:var(--green);background:rgba(52,211,153,.15)}
.quiz-option.wrong{border-color:var(--red);background:rgba(251,113,133,.15)}
.score-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--surface);border-radius:10px;margin-bottom:16px}
.score-bar span{font-size:.95rem;color:var(--muted)}
.score-bar .score{color:var(--green);font-weight:700;font-size:1.1rem}
.progress-bar{height:6px;background:var(--card);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),#38bdf8,var(--green));border-radius:3px;transition:width .3s}
.flashcard{background:linear-gradient(135deg,var(--surface),var(--card));border-radius:16px;padding:40px;text-align:center;min-height:250px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;border:2px solid var(--border);transition:.3s;position:relative;user-select:none}
.flashcard:hover{border-color:var(--accent)}
.flashcard .label{position:absolute;top:12px;left:16px;font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.flashcard .content{font-size:1.3rem;line-height:1.5}
.flashcard .hint{position:absolute;bottom:12px;font-size:.8rem;color:var(--muted)}
.fc-controls{display:flex;gap:10px;justify-content:center;margin-top:16px}
.fc-controls button{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:500;min-height:44px}
.btn-prev,.btn-next{background:var(--card);color:var(--text)}
.btn-prev:hover,.btn-next:hover{background:var(--accent)}
.btn-shuffle{background:var(--accent);color:#fff}
.category-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.category-filter button{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-size:.82rem;transition:.2s;min-height:36px}
.category-filter button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.aa-table{width:100%;border-collapse:collapse}
.aa-table th{background:var(--card);color:var(--accent2);padding:10px 12px;text-align:left;font-size:.85rem;position:sticky;top:0}
.aa-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:.88rem;color:var(--muted)}
.aa-table tr:hover td{background:rgba(232,121,249,.08)}
.aa-code{font-family:'Courier New',monospace;color:var(--green);font-weight:600}
.tab-bar{display:flex;gap:4px;margin-bottom:16px}
.tab-bar button{padding:8px 16px;border:none;border-radius:8px 8px 0 0;background:var(--card);color:var(--muted);cursor:pointer;font-size:.88rem;min-height:40px}
.tab-bar button.active{background:var(--accent);color:#fff}
.na-card{background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border);margin-bottom:10px}
.na-card h4{color:var(--accent2);font-size:.95rem}
.na-card p{color:var(--muted);font-size:.85rem}
.sectitle{font-size:1.3rem;font-weight:700;color:var(--accent2);margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid var(--border)}
.scard{padding:22px}
.ssteps{display:flex;flex-wrap:wrap;gap:8px;margin:12px 0}
.stp{display:flex;align-items:center;gap:8px;background:var(--card);border-radius:8px;padding:8px 14px}
.stp-n{width:22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sinfo{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}
.sibox{padding:16px 18px;border-radius:10px;border:1px solid}
.sibox h5{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;font-weight:700;margin-bottom:6px}
.sibox p{font-size:13px;line-height:1.7;color:var(--muted)}
.trow{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:10px}
.tnm{font-size:13px;color:var(--muted);font-weight:500}
.tdisp{font-size:28px;font-family:'Courier New',monospace;font-weight:700}
.tbtns{display:flex;gap:6px}
.tbtn{padding:8px 16px;border-radius:8px;border:2px solid;font-size:12px;font-weight:600;cursor:pointer;min-height:40px}
.tbtn-go{border-color:var(--accent);background:var(--accent);color:#fff}
.tbtn-go:hover{background:#d946ef}
.tbtn-pause{border-color:var(--yellow);background:rgba(251,191,36,.15);color:var(--yellow)}
.tbtn-rst{border-color:var(--border);background:var(--card);color:var(--muted)}
.tbtn-rst:hover{background:var(--border)}
/* ID TREE */
.tree-step{background:var(--surface);border:2px solid var(--border);border-radius:14px;padding:24px;text-align:center;margin-bottom:16px}
.tree-step h3{color:var(--accent2);margin-bottom:12px;font-size:1.1rem}
.tree-opts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.tree-btn{padding:12px 24px;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);cursor:pointer;font-size:.95rem;transition:.2s;min-height:48px;font-weight:500}
.tree-btn:hover{border-color:var(--accent);background:rgba(232,121,249,.1)}
.tree-btn.selected{border-color:var(--green);background:rgba(52,211,153,.15);color:var(--green)}
.tree-result{background:linear-gradient(135deg,rgba(52,211,153,.1),rgba(192,132,252,.1));border:2px solid var(--green);border-radius:14px;padding:24px;margin-top:16px}
.tree-result h3{color:var(--green);margin-bottom:8px}
.tree-result p{color:var(--muted);font-size:.9rem;line-height:1.6}
.tree-path{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;align-items:center}
.tree-path .tp{background:var(--card);color:var(--accent2);padding:4px 12px;border-radius:6px;font-size:.8rem}
.tree-path .arrow{color:var(--muted);font-size:.8rem}
/* MEDIA GUIDE */
.media-card{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:14px}
.media-card h3{color:var(--accent2);margin-bottom:6px;font-size:1.05rem}
.media-card .plate{display:inline-block;width:60px;height:60px;border-radius:50%;margin:8px 8px 8px 0;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;text-align:center;line-height:1.2}
.media-row{display:flex;flex-wrap:wrap;gap:12px;margin:8px 0}
.media-example{background:var(--card);border-radius:8px;padding:12px 16px;flex:1;min-width:180px}
.media-example h5{font-size:.8rem;color:var(--accent2);margin-bottom:4px}
.media-example p{font-size:.85rem;color:var(--muted)}
/* VIGNETTE */
.vignette-box{background:linear-gradient(135deg,var(--surface),var(--card));border:2px solid var(--border);border-radius:16px;padding:30px;text-align:center;margin-bottom:16px}
.vignette-box .scenario{font-size:1.1rem;line-height:1.7;color:var(--text);margin-bottom:20px}
.vignette-box .buzzwords{color:var(--yellow);font-weight:600}
.vig-btn{padding:12px 28px;border:none;border-radius:10px;cursor:pointer;font-size:.95rem;font-weight:600;min-height:48px;transition:.2s}
.vig-primary{background:var(--accent);color:#fff}.vig-primary:hover{background:#d946ef}
.vig-secondary{background:var(--card);color:var(--text);border:2px solid var(--border)}.vig-secondary:hover{border-color:var(--accent)}
/* LAB MATH */
.calc-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;margin-bottom:16px}
.calc-card h3{color:var(--accent2);margin-bottom:12px}
.calc-card label{display:block;color:var(--muted);font-size:.85rem;margin-bottom:4px;margin-top:12px}
.calc-input{width:100%;max-width:280px;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1rem;outline:none}
.calc-input:focus{border-color:var(--accent)}
.calc-result{margin-top:16px;padding:16px;background:rgba(52,211,153,.1);border:1px solid rgba(52,211,153,.3);border-radius:10px;font-size:1.1rem;color:var(--green);font-weight:700}
.calc-formula{color:var(--muted);font-size:.85rem;margin-top:8px;font-style:italic}
/* FAVORITES */
.fav-btn{position:absolute;top:8px;right:8px;background:none;border:none;font-size:1.2rem;cursor:pointer;opacity:.5;transition:.2s;padding:4px}
.fav-btn:hover,.fav-btn.faved{opacity:1}
.org-card{position:relative}
/* DETAIL ICONS */
.detail-view th .di{margin-right:6px}
/* LAB TESTS */
.labtest-card{background:var(--surface);border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:14px}
.labtest-card h3{color:var(--accent2);margin-bottom:8px}
.labtest-row{display:flex;gap:12px;flex-wrap:wrap;margin-top:10px}
.labtest-result{flex:1;min-width:180px;padding:16px;border-radius:10px;text-align:center}
.labtest-result .lt-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:4px}
.labtest-result .lt-val{font-size:1.1rem;font-weight:700;margin:6px 0}
.labtest-result .lt-ex{font-size:.8rem;opacity:.8}
/* ABX TABLE */
.abx-table{width:100%;border-collapse:collapse}
.abx-table th{background:var(--card);color:var(--accent2);padding:10px;text-align:left;font-size:.8rem;position:sticky;top:0}
.abx-table td{padding:8px 10px;border-bottom:1px solid var(--border);font-size:.82rem;color:var(--muted)}
.abx-table tr:hover td{background:rgba(232,121,249,.08)}
.abx-s{color:var(--green);font-weight:700}.abx-r{color:var(--red);font-weight:700}.abx-v{color:var(--yellow);font-weight:700}
@media(max-width:600px){.quiz-options{grid-template-columns:1fr}.grid{grid-template-columns:1fr}header h1{font-size:1.5rem}nav button{padding:8px 10px;font-size:.78rem}.sinfo{grid-template-columns:1fr}.trow{flex-wrap:wrap;gap:8px}.tdisp{font-size:22px}.tree-opts{flex-direction:column}.media-row{flex-direction:column}}
</style>
</head>
<body>
<div class="app">
<header>
<h1>LabBuddy</h1>
<p>BIO 265 Microbiology Study Companion</p>
</header>
<nav id="mainNav">
<button class="active" onclick="showSection('organisms')">Organisms</button>
<button onclick="showSection('stains')">Staining</button>
<button onclick="showSection('amino')">Amino Acids</button>
<button onclick="showSection('nucleic')">Nucleic Acids</button>
<button onclick="showSection('idtree')">ID Tree</button>
<button onclick="showSection('media')">Media Guide</button>
<button onclick="showSection('flashcards')">Flashcards</button>
<button onclick="showSection('quiz')">Quiz</button>
<button onclick="showSection('vignettes')">Vignettes</button>
<button onclick="showSection('labmath')">Lab Math</button>
<button onclick="showSection('labtests')">Lab Tests</button>
<button onclick="showSection('abx')">Abx Chart</button>
<button onclick="showSection('timers')">Timers</button>
</nav>

<div id="organisms" class="section active">
<input type="text" class="search-box" placeholder="Search organisms by name, type, disease, lab finding..." oninput="filterOrganisms(this.value)">
<div class="category-filter" id="orgFilter"></div>
<div class="grid" id="orgGrid"></div>
<div class="detail-view" id="orgDetail" style="display:none"></div>
</div>

<div id="stains" class="section"><div id="stainsContent"></div></div>
<div id="amino" class="section">
<input type="text" class="search-box" placeholder="Search amino acids..." oninput="filterAA(this.value)">
<div class="category-filter" id="aaFilter"></div>
<div style="overflow-x:auto"><table class="aa-table" id="aaTable"><thead><tr><th>Name</th><th>3-Letter</th><th>1-Letter</th><th>Type</th><th>Key Feature</th></tr></thead><tbody></tbody></table></div>
</div>
<div id="nucleic" class="section">
<div class="tab-bar" id="naTab">
<button class="active" onclick="showNATab('dna')">DNA</button>
<button onclick="showNATab('rna')">RNA</button>
<button onclick="showNATab('compare')">Compare</button>
</div>
<div id="naContent"></div>
</div>
<div id="idtree" class="section"><div id="idtreeContent"></div></div>
<div id="media" class="section"><div id="mediaContent"></div></div>
<div id="flashcards" class="section">
<div class="category-filter" id="fcFilter"></div>
<div class="score-bar"><span id="fcCount">Card 1 of 1</span><span class="score" id="fcCat"></span></div>
<div class="flashcard" id="flashcard" onclick="flipCard()">
<div class="label" id="fcLabel">Term</div>
<div class="content" id="fcContent">Loading...</div>
<div class="hint">Click to flip</div>
</div>
<div class="fc-controls">
<button class="btn-prev" onclick="prevCard()">&#8592; Prev</button>
<button class="btn-shuffle" onclick="shuffleCards()">Shuffle</button>
<button class="btn-next" onclick="nextCard()">Next &#8594;</button>
</div>
</div>
<div id="quiz" class="section">
<div class="category-filter" id="quizFilter"></div>
<div class="score-bar">
<span>Question <span id="qNum">1</span> of <span id="qTotal">10</span></span>
<span class="score">Score: <span id="qScore">0</span></span>
</div>
<div class="progress-bar"><div class="progress-fill" id="qProgress" style="width:0%"></div></div>
<div class="quiz-box" id="quizBox"></div>
</div>
<div id="vignettes" class="section"><div id="vigContent"></div></div>
<div id="labmath" class="section"><div id="labmathContent"></div></div>
<div id="labtests" class="section"><div id="labtestsContent"></div></div>
<div id="abx" class="section"><div id="abxContent"></div></div>
<div id="timers" class="section"><div id="timersContent"></div></div>
</div>
<footer style="text-align:center;margin-top:50px;padding:20px;opacity:0.7;font-style:italic;color:var(--muted);font-size:.85rem">hello aaliah &lt;3</footer>

<script>
// ══════════════════════════════════════
// DATA: ORGANISMS (Full BIO 261 List)
// ══════════════════════════════════════
const organisms=[
// ── GRAM-POSITIVE COCCI ──
{name:"Staphylococcus aureus",type:"Gram+ Cocci",gram:"positive",morphology:"Clusters",diseases:["Skin infections (impetigo, cellulitis, abscess)","Endocarditis","Osteomyelitis","Toxic Shock Syndrome","Food poisoning","Sepsis","Pneumonia"],virulence:["Coagulase","Protein A","Hemolysins (alpha, beta)","TSST-1","Enterotoxins","PVL (Panton-Valentine Leukocidin)"],lab:"Catalase +, Coagulase +, Beta-hemolytic, MSA Yellow (mannitol fermenter), Gold pigment",treatment:"Nafcillin/Oxacillin (MSSA); Vancomycin (MRSA)",notes:"Most common cause of skin/soft tissue infections. MRSA is major nosocomial pathogen. Protein A binds IgG Fc region."},
{name:"Staphylococcus epidermidis",type:"Gram+ Cocci",gram:"positive",morphology:"Clusters",diseases:["Prosthetic device infections","Catheter infections","Endocarditis (prosthetic valves)"],virulence:["Biofilm formation","Polysaccharide adhesins"],lab:"Catalase +, Coagulase -, Novobiocin SENSITIVE, MSA Pink (non-fermenter)",treatment:"Vancomycin (often methicillin-resistant)",notes:"Normal skin flora. #1 cause of infections on prosthetic devices and indwelling catheters. Biofilm producer."},
{name:"Staphylococcus saprophyticus",type:"Gram+ Cocci",gram:"positive",morphology:"Clusters",diseases:["UTI in young sexually active women","Cystitis"],virulence:["Urease","Surface adhesins"],lab:"Catalase +, Coagulase -, Novobiocin RESISTANT",treatment:"TMP-SMX or Nitrofurantoin",notes:"2nd most common cause of UTI in young women (after E. coli). Novobiocin resistance distinguishes from S. epidermidis."},
{name:"Streptococcus pyogenes",type:"Gram+ Cocci",gram:"positive",morphology:"Chains",diseases:["Pharyngitis","Scarlet fever","Cellulitis","Necrotizing fasciitis","Impetigo","Rheumatic fever (post-infectious)","Post-strep glomerulonephritis"],virulence:["M protein","Streptolysin O (ASO titer)","Streptolysin S","Hyaluronidase","Streptokinase","DNase B","Erythrogenic toxin (scarlet fever)"],lab:"Catalase -, Beta-hemolytic, Bacitracin SENSITIVE, PYR +, Group A (Lancefield)",treatment:"Penicillin (no resistance reported)",notes:"Group A Strep (GAS). M protein is major virulence factor (anti-phagocytic). Jones criteria for rheumatic fever."},
{name:"Streptococcus agalactiae",type:"Gram+ Cocci",gram:"positive",morphology:"Chains",diseases:["Neonatal meningitis","Neonatal sepsis","Neonatal pneumonia","Chorioamnionitis","UTI in pregnant women"],virulence:["Capsular polysaccharide","CAMP factor","Beta-hemolysin"],lab:"Catalase -, Beta-hemolytic, Bacitracin RESISTANT, CAMP test +, Hippurate hydrolysis +, Group B (Lancefield)",treatment:"Penicillin/Ampicillin + Gentamicin; Intrapartum prophylaxis",notes:"Group B Strep (GBS). Screen pregnant women at 35-37 weeks. #1 cause of neonatal meningitis/sepsis. CAMP factor enlarges S. aureus hemolysis zone."},
{name:"Streptococcus pneumoniae",type:"Gram+ Cocci",gram:"positive",morphology:"Diplococci (lancet-shaped)",diseases:["Community-acquired pneumonia (#1)","Meningitis in adults (#1)","Otitis media in children (#1)","Sinusitis"],virulence:["Polysaccharide capsule (#1 virulence factor)","IgA protease","Pneumolysin","Adhesins","Autolysin"],lab:"Catalase -, Alpha-hemolytic, Optochin SENSITIVE, Bile soluble, Quellung reaction + (capsule swelling)",treatment:"Penicillin/Ceftriaxone; Vancomycin for resistant strains",notes:"Lancet-shaped diplococci. Rusty sputum in pneumonia. Capsule is most important virulence factor. Vaccines: PCV13, PPSV23."},
{name:"Viridans Streptococci",type:"Gram+ Cocci",gram:"positive",morphology:"Chains",diseases:["Subacute bacterial endocarditis","Dental caries (S. mutans)"],virulence:["Dextrans (adhesion to damaged valves)","Glucans"],lab:"Catalase -, Alpha-hemolytic, Optochin RESISTANT, Bile insoluble",treatment:"Penicillin + Gentamicin",notes:"Normal oral flora. S. mutans causes dental caries. Subacute endocarditis on DAMAGED valves (vs S. aureus = acute, normal valves). Distinguished from S. pneumoniae by optochin resistance."},
{name:"Enterococcus faecalis",type:"Gram+ Cocci",gram:"positive",morphology:"Chains/pairs",diseases:["UTI","Biliary tract infections","Endocarditis","Intra-abdominal infections"],virulence:["Intrinsic antibiotic resistance","Cytolysin","Gelatinase"],lab:"Catalase -, Gamma-hemolytic (no hemolysis), Bile Esculin +, Growth in 6.5% NaCl, PYR +, Group D (Lancefield)",treatment:"Ampicillin + Gentamicin; Linezolid or Daptomycin for VRE",notes:"Enterococcus faecalis (more common) and E. faecium (more resistant). VRE = Vancomycin-Resistant Enterococci. Grows in bile and high salt."},

{name:"Clostridioides difficile",type:"Gram+ Rods",gram:"positive",morphology:"Rods (spore-forming, anaerobic)",diseases:["Antibiotic-associated diarrhea","Pseudomembranous colitis","Toxic megacolon"],virulence:["Toxin A (enterotoxin - attracts neutrophils)","Toxin B (cytotoxin - destroys cytoskeleton)","Spores"],lab:"Toxin assay (ELISA or PCR for toxin B gene), Anaerobic culture, Cytotoxicity assay",treatment:"Oral Vancomycin or Fidaxomicin; Fecal microbiota transplant for recurrent",notes:"Triggered by antibiotic use (clindamycin, fluoroquinolones, ampicillin, 3rd-gen cephalosporins). Spores persist in hospital environment. Pseudomembranes on colonoscopy."},
{name:"Clostridium botulinum",type:"Gram+ Rods",gram:"positive",morphology:"Rods (spore-forming, anaerobic)",diseases:["Foodborne botulism","Infant botulism (floppy baby)","Wound botulism"],virulence:["Botulinum toxin (blocks ACh release at NMJ, cleaves SNARE proteins)"],lab:"Mouse bioassay, Toxin detection in serum/stool/food",treatment:"Antitoxin (equine); Supportive (ventilation); Do NOT give antibiotics for infant botulism",notes:"DESCENDING flaccid paralysis (cranial nerves first). Honey risk for infants. Preformed toxin in canned foods. Toxin used therapeutically (Botox). Blocks ACh release."},
{name:"Clostridium perfringens",type:"Gram+ Rods",gram:"positive",morphology:"Rods (spore-forming, anaerobic)",diseases:["Gas gangrene (myonecrosis)","Food poisoning (watery diarrhea)","Necrotizing enteritis"],virulence:["Alpha toxin (lecithinase/phospholipase C - destroys cell membranes)","Enterotoxin"],lab:"Double zone of beta-hemolysis on blood agar, Stormy fermentation in milk media, Lecithinase + on egg yolk agar",treatment:"Penicillin + Clindamycin + Surgical debridement (hyperbaric O2)",notes:"Gas gangrene: crepitus, rapid tissue destruction. Food poisoning: reheated meat, 8-16 hr onset. Alpha toxin = lecithinase."},
{name:"Listeria monocytogenes",type:"Gram+ Rods",gram:"positive",morphology:"Rods (non-spore-forming, facultative intracellular)",diseases:["Neonatal meningitis/sepsis","Meningitis in immunocompromised/elderly","Gastroenteritis","Granulomatosis infantiseptica"],virulence:["Listeriolysin O (LLO - escapes phagosome)","ActA (actin rockets for cell-to-cell spread)","Internalins"],lab:"Catalase +, Beta-hemolytic, Tumbling motility at room temp (22C), Cold enrichment (grows at 4C)",treatment:"Ampicillin + Gentamicin (NOT cephalosporins)",notes:"Facultative intracellular. Acquired from unpasteurized dairy, deli meats, soft cheeses. Dangerous in pregnant women (transplacental). Actin rockets = cell-to-cell spread."},

// ── GRAM-NEGATIVE COCCI & COCCOBACILLI ──

{name:"Neisseria gonorrhoeae",type:"Gram- Cocci",gram:"negative",morphology:"Diplococci (kidney-bean shaped, intracellular)",diseases:["Gonorrhea (urethritis, cervicitis)","PID","Disseminated gonococcal infection (septic arthritis)","Neonatal ophthalmia","Fitz-Hugh-Curtis syndrome"],virulence:["Pili (antigenic/phase variation)","Opa proteins","LOS (lipooligosaccharide)","IgA protease","Beta-lactamase"],lab:"Oxidase +, Glucose fermenter ONLY (NOT maltose), Thayer-Martin agar, Intracellular diplococci on Gram stain",treatment:"Ceftriaxone 500mg IM single dose + treat for Chlamydia if not ruled out",notes:"STI. No vaccine (antigenic variation). Increasing resistance. No maltose fermentation (GONorrhoeae = Glucose Only, No Maltose). Erythromycin eye drops for neonatal prophylaxis."},
{name:"Moraxella catarrhalis",type:"Gram- Cocci",gram:"negative",morphology:"Diplococci",diseases:["Otitis media (children)","Sinusitis","Bronchitis/pneumonia (COPD exacerbation)"],virulence:["Beta-lactamase","Outer membrane proteins"],lab:"Oxidase +, DNase +, Hockey puck test (slides across agar when pushed)",treatment:"Amoxicillin-clavulanate (beta-lactamase producer)",notes:"3rd most common cause of otitis media (after S. pneumoniae and H. influenzae). Common cause of COPD exacerbations. Almost all strains produce beta-lactamase."},
{name:"Haemophilus influenzae",type:"Gram- Coccobacilli",gram:"negative",morphology:"Coccobacilli (pleomorphic)",diseases:["Meningitis (children, pre-vaccine)","Epiglottitis (type b)","Otitis media","Pneumonia","Sinusitis"],virulence:["Polyribitol phosphate capsule (type b)","IgA protease","LPS"],lab:"Requires Factors V (NAD) and X (hemin) for growth, Chocolate agar (NOT blood agar), Satellitism around S. aureus",treatment:"Ceftriaxone (meningitis); Amoxicillin-clavulanate (otitis); Rifampin prophylaxis",notes:"Type b (Hib) causes invasive disease. Hib vaccine dramatically reduced meningitis. Needs factors V (NAD) and X (hemin) = chocolate agar. Satellitism = grows near Staph colonies."},
{name:"Bordetella pertussis",type:"Gram- Coccobacilli",gram:"negative",morphology:"Coccobacilli",diseases:["Whooping cough (pertussis) - catarrhal, paroxysmal, convalescent stages"],virulence:["Pertussis toxin (PT - ADP-ribosylates Gi protein, increases cAMP)","Filamentous hemagglutinin (FHA)","Tracheal cytotoxin","Adenylate cyclase toxin"],lab:"Bordet-Gengou agar (potato-glycerol-blood) or Regan-Lowe agar, PCR preferred",treatment:"Macrolides (Azithromycin/Erythromycin); DTaP/Tdap vaccine",notes:"3 stages: Catarrhal (most contagious, URI-like), Paroxysmal (whooping cough, post-tussive vomiting), Convalescent. Pertussis toxin disables Gi = increased cAMP. Lymphocytosis on CBC."},

// ── GRAM-NEGATIVE RODS (ENTERICS) ──
{name:"Escherichia coli",type:"Gram- Rods",gram:"negative",morphology:"Rods",diseases:["UTI (#1 cause)","Neonatal meningitis (K1 capsule)","Traveler's diarrhea (ETEC)","Bloody diarrhea/HUS (EHEC O157:H7)","Sepsis/bacteremia"],virulence:["LPS (endotoxin)","Type 1 pili (UTI)","P pili (pyelonephritis)","K1 capsule","Shiga-like toxin (EHEC)","Heat-labile/stable toxins (ETEC)"],lab:"Lactose fermenter, Indole +, Green metallic sheen on EMB agar, Pink on MacConkey",treatment:"TMP-SMX or fluoroquinolones (UTI); Supportive for EHEC (NO antibiotics - risk of HUS)",notes:"Pathotypes: ETEC (traveler's), EHEC/STEC (O157:H7, HUS), EPEC (infant diarrhea), EIEC (dysentery-like), EAEC. EMB = Eosin Methylene Blue."},
{name:"Klebsiella pneumoniae",type:"Gram- Rods",gram:"negative",morphology:"Rods (encapsulated, mucoid)",diseases:["Pneumonia (aspiration, nosocomial)","UTI","Liver abscess","Sepsis"],virulence:["Large mucoid capsule","LPS","Urease"],lab:"Lactose fermenter, Mucoid colonies (string test +), Currant-jelly sputum, Pink on MacConkey",treatment:"3rd-gen Cephalosporins; Carbapenems for ESBL; Watch for CRE (carbapenem-resistant)",notes:"Current-jelly sputum. Common in alcoholics and diabetics. Large capsule gives mucoid appearance. Increasing ESBL and carbapenem resistance (CRE/KPC)."},
{name:"Serratia marcescens",type:"Gram- Rods",gram:"negative",morphology:"Rods",diseases:["Nosocomial pneumonia","UTI","Wound infections","Endocarditis (IVDU)"],virulence:["Red pigment (prodigiosin)","Biofilm","DNase"],lab:"Slow lactose fermenter, RED PIGMENT at room temperature (25C), DNase +",treatment:"Fluoroquinolones or Carbapenems",notes:"Red pigment at room temp (not at 37C). Nosocomial pathogen. Associated with IVDU endocarditis. Part of the SPACE organisms (Serratia, Pseudomonas, Acinetobacter, Citrobacter, Enterobacter)."},
{name:"Enterobacter cloacae",type:"Gram- Rods",gram:"negative",morphology:"Rods (motile)",diseases:["Nosocomial UTI","Nosocomial pneumonia","Bacteremia"],virulence:["AmpC beta-lactamase (inducible)","LPS"],lab:"Lactose fermenter, Motile, Pink on MacConkey",treatment:"Carbapenems (avoid 3rd-gen cephalosporins - inducible AmpC resistance)",notes:"SPACE organism. Has inducible AmpC beta-lactamase: may appear sensitive to 3rd-gen cephalosporins initially, then develops resistance during treatment."},
{name:"Salmonella typhi",type:"Gram- Rods",gram:"negative",morphology:"Rods (flagellated)",diseases:["Typhoid fever","Rose spots","Intestinal perforation","Chronic carrier state (gallbladder)"],virulence:["Vi capsule","LPS","Type III secretion system","Flagella (H antigen)"],lab:"Non-lactose fermenter, H2S + on TSI/XLD, Motile, Widal test",treatment:"Fluoroquinolones or Ceftriaxone or Azithromycin",notes:"Typhoid: stepwise fever, rose spots on abdomen, relative bradycardia, hepatosplenomegaly. Chronic carriers (gallbladder) - Typhoid Mary. Fecal-oral transmission."},
{name:"Salmonella enteritidis",type:"Gram- Rods",gram:"negative",morphology:"Rods (flagellated)",diseases:["Gastroenteritis (non-typhoidal)","Bacteremia","Osteomyelitis in sickle cell disease"],virulence:["LPS","Type III secretion system","Flagella"],lab:"Non-lactose fermenter, H2S +, Motile, Grows on Hektoen/XLD agar",treatment:"Usually self-limiting; Fluoroquinolones if severe",notes:"From poultry, eggs, reptiles/turtles. Osteomyelitis in sickle cell patients (Salmonella > S. aureus). Does NOT produce as severe disease as S. typhi."},
{name:"Shigella dysenteriae",type:"Gram- Rods",gram:"negative",morphology:"Rods (non-motile)",diseases:["Bacillary dysentery (bloody diarrhea with mucus)","HUS (Shiga toxin)"],virulence:["Shiga toxin (inactivates 60S ribosomal subunit)","Type III secretion system","Very low infectious dose (10-200 organisms)"],lab:"Non-lactose fermenter, Non-motile, H2S -, No gas production, Green on Hektoen agar",treatment:"Fluoroquinolones or Azithromycin; Rehydration",notes:"4 species: S. dysenteriae (most severe, Shiga toxin), S. flexneri, S. boydii, S. sonnei (most common in US). Very low ID50. Invades colonic mucosa. Fecal-oral, daycare outbreaks."},
{name:"Proteus mirabilis",type:"Gram- Rods",gram:"negative",morphology:"Rods (highly motile)",diseases:["UTI (complicated)","Staghorn calculi (struvite stones)","Wound infections"],virulence:["Urease (alkalinizes urine, struvite stones)","Swarming motility","LPS"],lab:"Non-lactose fermenter, Urease +, SWARMING motility on blood agar, H2S +",treatment:"TMP-SMX or Fluoroquinolones (intrinsically resistant to Nitrofurantoin)",notes:"Urease splits urea to ammonia = alkaline urine = struvite (magnesium ammonium phosphate) staghorn calculi. Swarming on agar is classic. Ammonia smell."},
{name:"Yersinia enterocolitica",type:"Gram- Rods",gram:"negative",morphology:"Rods",diseases:["Enterocolitis (mimics appendicitis)","Mesenteric lymphadenitis","Reactive arthritis"],virulence:["Invasins","Heat-stable enterotoxin","Type III secretion"],lab:"Non-lactose fermenter, Cold enrichment (grows at 4C), Grows on CIN agar",treatment:"Usually self-limiting; Fluoroquinolones or TMP-SMX if severe",notes:"Transmitted by contaminated pork, puppy feces, unpasteurized milk. Mimics appendicitis (RLQ pain + mesenteric adenitis). Grows in cold (contaminated blood transfusions)."},
{name:"Pseudomonas aeruginosa",type:"Gram- Rods",gram:"negative",morphology:"Rods",diseases:["Pneumonia (CF, ventilator)","Burn wound infections","Otitis externa (swimmer's ear)","UTI (catheter)","Hot tub folliculitis","Ecthyma gangrenosum","Malignant otitis externa (diabetics)"],virulence:["Exotoxin A (inactivates EF-2, like diphtheria)","Elastase","Phospholipase C","Pyocyanin (blue-green)","Pyoverdine","Biofilm","LPS","Alginate (mucoid in CF)"],lab:"Oxidase +, Non-lactose fermenter, BLUE-GREEN pigment (pyocyanin), Fruity/grape-like odor, Grows at 42C",treatment:"Anti-pseudomonal: Piperacillin-tazobactam, Cefepime, Ceftazidime, Meropenem +/- Aminoglycoside or Ciprofloxacin",notes:"Obligate aerobe. Intrinsically resistant to many antibiotics. Exotoxin A mechanism same as diphtheria toxin. Mucoid colonies in CF patients (alginate)."},
{name:"Vibrio cholerae",type:"Gram- Rods",gram:"negative",morphology:"Comma-shaped rods",diseases:["Cholera (rice-water stools)","Severe watery diarrhea","Dehydration"],virulence:["Cholera toxin (AB toxin - ADP-ribosylates Gs, permanently activates adenylate cyclase, increases cAMP)","Pili","Mucinase"],lab:"Oxidase +, Comma-shaped, TCBS agar (yellow colonies), Grows in alkaline media",treatment:"Oral rehydration therapy (ORT); Doxycycline or Azithromycin for severe cases",notes:"Cholera toxin: ADP-ribosylates Gs protein = permanent cAMP activation = massive Cl-/H2O secretion. Rice-water stools. Contaminated water. O1 and O139 serotypes cause epidemics."},
{name:"Vibrio parahaemolyticus",type:"Gram- Rods",gram:"negative",morphology:"Comma-shaped rods",diseases:["Gastroenteritis (watery diarrhea)","Wound infections"],virulence:["Thermostable direct hemolysin (TDH)","Type III secretion system","Kanagawa phenomenon (beta-hemolysis on Wagatsuma agar)"],lab:"Oxidase +, Comma-shaped, TCBS agar (GREEN colonies, unlike V. cholerae yellow), Halophilic (requires NaCl for growth)",treatment:"Usually self-limiting; Doxycycline or Fluoroquinolone if severe",notes:"Raw/undercooked SHELLFISH and oysters. Halophilic (salt-loving). Most common cause of Vibrio gastroenteritis in US. Green on TCBS (vs yellow for V. cholerae). Wound infections from saltwater exposure."},
{name:"Campylobacter jejuni",type:"Gram- Rods",gram:"negative",morphology:"Comma/S-shaped, gull-wing",diseases:["Bacterial gastroenteritis (#1 cause in developed countries)","Bloody diarrhea","Guillain-Barre syndrome (post-infectious)","Reactive arthritis"],virulence:["Cytolethal distending toxin","Flagella","LOS (molecular mimicry - Guillain-Barre)"],lab:"Oxidase +, Grows at 42C (thermophilic), Skirrow or Campy-BAP media, Microaerophilic, S-shaped/gull-wing on Gram stain",treatment:"Usually self-limiting; Azithromycin if severe (Fluoroquinolone resistance increasing)",notes:"#1 cause of bacterial diarrhea in US. From undercooked poultry, unpasteurized milk. Associated with Guillain-Barre (ascending paralysis) via molecular mimicry of gangliosides."},
{name:"Helicobacter pylori",type:"Gram- Rods",gram:"negative",morphology:"Spiral/curved rods",diseases:["Chronic gastritis","Peptic ulcer disease (duodenal > gastric)","Gastric adenocarcinoma","MALT lymphoma"],virulence:["Urease (neutralizes stomach acid)","CagA (cytotoxin)","VacA (vacuolating toxin)","Flagella","Mucinase"],lab:"Urease + (rapid urease test/CLO test), Urea breath test, Stool antigen test, Histology with Warthin-Starry silver stain",treatment:"Triple therapy: PPI + Clarithromycin + Amoxicillin (or Metronidazole); Quadruple: PPI + Bismuth + Metronidazole + Tetracycline",notes:"Lives in gastric mucus layer. Urease produces ammonia (alkaline microenvironment). Associated with duodenal ulcers > gastric ulcers. Type I carcinogen (gastric cancer, MALT lymphoma)."},

// ── ATYPICALS & SPIROCHETES ──
{name:"Mycobacterium tuberculosis",type:"Acid-Fast",gram:"neither",morphology:"Rods (acid-fast)",diseases:["Pulmonary TB","Miliary TB","Pott disease (spinal TB)","TB meningitis","Renal TB"],virulence:["Mycolic acid/cord factor (trehalose dimycolate)","Sulfatides (inhibit phagolysosome fusion)","LAM"],lab:"Acid-fast (Ziehl-Neelsen) bright red, Lowenstein-Jensen agar (slow grower, weeks), Auramine-rhodamine fluorescent stain, PPD/IGRA screening",treatment:"RIPE x 2 months, then RI x 4 months: Rifampin, Isoniazid, Pyrazinamide, Ethambutol",notes:"Leading infectious killer worldwide. Caseating granulomas. Ghon focus (primary TB) / Ghon complex (+ hilar lymph nodes). PPD/Mantoux test. RIPE side effects: Rifampin (red fluids), INH (hepatitis, peripheral neuropathy - give B6), Pyrazinamide (hyperuricemia), Ethambutol (optic neuritis)."},
{name:"Mycobacterium leprae",type:"Acid-Fast",gram:"neither",morphology:"Rods (acid-fast, cannot be cultured)",diseases:["Leprosy/Hansen disease - Tuberculoid (few lesions, strong Th1) and Lepromatous (many lesions, weak immune response)"],virulence:["Preference for cool body temperatures","Infects Schwann cells"],lab:"Cannot be grown in culture, Grows in armadillo footpads, Acid-fast stain of skin biopsy, Fite stain",treatment:"Dapsone + Rifampin (tuberculoid); + Clofazimine (lepromatous)",notes:"Affects cool body parts: skin, superficial nerves, nose, ears. Tuberculoid (paucibacillary): few lesions, strong cell-mediated immunity. Lepromatous (multibacillary): diffuse disease, weak CMI, leonine facies. Armadillos are reservoir."},
{name:"Mycoplasma pneumoniae",type:"Atypical",gram:"neither",morphology:"No cell wall (pleomorphic)",diseases:["Walking pneumonia (atypical)","Tracheobronchitis","Bullous myringitis (ear)"],virulence:["P1 adhesin protein","Hydrogen peroxide production","No cell wall (no peptidoglycan)"],lab:"No Gram stain (no cell wall), Eaton agar (takes weeks), Cold agglutinins (IgM that agglutinate RBCs at 4C), PCR preferred, Fried-egg colonies",treatment:"Macrolides (Azithromycin) or Doxycycline or Fluoroquinolones (NOT beta-lactams - no cell wall)",notes:"Most common atypical pneumonia. NO cell wall = no Gram stain, resistant to beta-lactams. Walking pneumonia in young adults. Cold agglutinins (IgM). X-ray worse than clinical exam."},
{name:"Chlamydia trachomatis",type:"Atypical",gram:"neither",morphology:"Obligate intracellular (elementary/reticulate bodies)",diseases:["Urogenital chlamydia (most common bacterial STI)","Lymphogranuloma venereum (L1-L3)","Trachoma (leading infectious cause of blindness)","Neonatal conjunctivitis/pneumonia","Reactive arthritis"],virulence:["Elementary body (EB, infectious, extracellular)","Reticulate body (RB, replicates intracellularly)","Type III secretion"],lab:"Cannot grow on standard media, McCoy cell culture with iodine-staining inclusions, NAAT (PCR) preferred, Giemsa stain shows inclusions",treatment:"Azithromycin (single dose) or Doxycycline (7 days); Erythromycin for neonates",notes:"Obligate intracellular. EB = small, dense, infectious (Elementary = Enters cell). RB = larger, replicates (Reticulate = Replicates). Serotypes A-C: trachoma. D-K: urogenital/neonatal. L1-L3: LGV. Screen sexually active women <25."},
{name:"Treponema pallidum",type:"Spirochete",gram:"neither",morphology:"Spirochete (thin, tightly coiled)",diseases:["Syphilis - Primary (chancre), Secondary (rash, condylomata lata), Latent, Tertiary (gummas, tabes dorsalis, aortitis)","Congenital syphilis"],virulence:["Outer membrane proteins","Hyaluronidase","Immune evasion (poor antigenicity)"],lab:"Cannot be cultured, Dark-field microscopy, Non-treponemal tests: VDRL/RPR (screening, follow treatment), Treponemal tests: FTA-ABS (confirmatory)",treatment:"Penicillin G (all stages); Doxycycline if penicillin allergy; Jarisch-Herxheimer reaction possible",notes:"Primary: painless chancre. Secondary: diffuse maculopapular rash (palms/soles), condylomata lata, flu-like. Tertiary: gummas, cardiovascular (aortitis), neurosyphilis (tabes dorsalis, Argyll Robertson pupils). Congenital: Hutchinson teeth, saddle nose, saber shins."},
{name:"Borrelia burgdorferi",type:"Spirochete",gram:"neither",morphology:"Spirochete (large, loosely coiled)",diseases:["Lyme disease - Stage 1 (erythema migrans), Stage 2 (carditis, Bell palsy), Stage 3 (arthritis, encephalopathy)"],virulence:["OspA, OspB, OspC surface proteins","Immune evasion via antigenic variation"],lab:"ELISA screening + Western blot confirmation, Blood smear (rarely seen), Barbour-Stoenner-Kelly (BSK) medium",treatment:"Doxycycline (early); Ceftriaxone (late/neuro); Amoxicillin for children/pregnant",notes:"Ixodes tick vector (deer tick). Stage 1: erythema migrans (bull's-eye rash). Stage 2: heart block, facial nerve (Bell) palsy. Stage 3: migratory arthritis (large joints). Northeast/Midwest US. White-footed mouse reservoir."},
{name:"Leptospira interrogans",type:"Spirochete",gram:"neither",morphology:"Spirochete (question-mark shaped, hooked ends)",diseases:["Leptospirosis","Weil disease (severe: jaundice, renal failure, hemorrhage)"],virulence:["LPS","Motility (penetrates mucous membranes)"],lab:"Dark-field microscopy, Fletcher/EMJH medium, Serology (MAT - microscopic agglutination test)",treatment:"Penicillin or Doxycycline; Doxycycline for prophylaxis",notes:"Question-mark shape with hooked ends. Transmitted through contact with animal urine (rats, dogs) in contaminated water. Weil disease = severe form with jaundice + renal failure + hemorrhage. Occupational: farmers, sewage workers."},
{name:"Rickettsia rickettsii",type:"Atypical",gram:"neither",morphology:"Obligate intracellular (small Gram-negative-like)",diseases:["Rocky Mountain Spotted Fever (RMSF)","Rash (starts on wrists/ankles, spreads to trunk/palms/soles)"],virulence:["OmpA/OmpB (outer membrane proteins)","Phospholipase A2","Invades endothelial cells causing vasculitis"],lab:"Obligate intracellular (cannot culture on standard media), Weil-Felix test (cross-reacts with Proteus OX antigens), IFA serology, Skin biopsy with immunofluorescence",treatment:"Doxycycline (drug of choice for ALL ages, including children); treat empirically, do NOT wait for confirmation",notes:"Tick-borne (Dermacentor - dog tick/wood tick). Rash: starts on extremities (wrists/ankles), spreads centrally, involves palms/soles. Vasculitis from endothelial invasion. Can be fatal if untreated. Triad: fever, headache, rash."},

function buildQuizQuestions(){
  const qs=[];
  organisms.forEach(o=>{
    qs.push({cat:"Organisms",q:`Which organism: "${o.lab}"?`,correct:o.name,options:getRandomOptions(organisms.map(x=>x.name),o.name,3)});
    if(o.diseases.length>0) qs.push({cat:"Organisms",q:`${o.name} causes which of the following?`,correct:o.diseases[0],options:getRandomOptions(organisms.flatMap(x=>x.diseases),o.diseases[0],3)});
  });
  aminoAcids.forEach(a=>{
    qs.push({cat:"Amino Acids",q:`One-letter code for ${a.name}?`,correct:a.one,options:getRandomOptions(aminoAcids.map(x=>x.one),a.one,3)});
    qs.push({cat:"Amino Acids",q:`${a.name} is classified as:`,correct:a.type,options:getRandomOptions(["Nonpolar","Polar","Positive","Negative"],a.type,3)});
  });
  labStains.forEach(s=>{
    qs.push({cat:"Staining",q:`What does the ${s.name} show?`,correct:s.result.substring(0,60)+'...',options:getRandomOptions(labStains.map(x=>x.result.substring(0,60)+'...'),s.result.substring(0,60)+'...',3)});
  });
  return qs;
}
function getRandomOptions(pool,correct,count){
  const filtered=[...new Set(pool.filter(x=>x!==correct))];
  const shuffled=filtered.sort(()=>Math.random()-.5).slice(0,count);
  return[correct,...shuffled].sort(()=>Math.random()-.5);
}

let orgCatFilter='All';
function renderOrganisms(search=''){
  const types=['All','Favorites',...new Set(organisms.map(o=>o.type))];
  document.getElementById('orgFilter').innerHTML=types.map(t=>`<button class="${t===orgCatFilter?'active':''}" onclick="orgCatFilter='${t}';renderOrganisms(document.querySelector('#organisms .search-box').value)">${t}</button>`).join('');
  const s=search.toLowerCase();
  const filtered=organisms.filter(o=>{
    const matchSearch=!s||o.name.toLowerCase().includes(s)||o.type.toLowerCase().includes(s)||o.diseases.some(d=>d.toLowerCase().includes(s))||o.lab.toLowerCase().includes(s)||o.virulence.some(v=>v.toLowerCase().includes(s))||o.treatment.toLowerCase().includes(s);
    const matchCat=orgCatFilter==='All'||o.type===orgCatFilter||(orgCatFilter==='Favorites'&&isFav(o.name));
    return matchSearch&&matchCat;
  });
  document.getElementById('orgGrid').innerHTML=filtered.map(o=>{const idx=organisms.indexOf(o);const faved=isFav(o.name);return`<div class="org-card" onclick="showOrgDetail(${idx})"><button class="fav-btn ${faved?'faved':''}" onclick="toggleFav('${o.name.replace(/'/g,"\\'")}',event)">${faved?'\u2605':'\u2606'}</button><h4>${o.name}</h4><span class="type">${o.type}</span><p>${o.diseases.slice(0,2).join(', ')}</p></div>`;}).join('')||'<p style="color:var(--muted);text-align:center;padding:40px">No organisms found.</p>';
}

  html+='<p style="color:var(--muted);margin-bottom:16px;font-size:.9rem">Follow the lab results step-by-step to identify your unknown organism.</p>';
  if(treePath.length>0){
    html+='<div class="tree-path">';
    treePath.forEach((p,i)=>{html+=`<span class="tp">${p}</span>`;if(i<treePath.length-1)html+='<span class="arrow">\u2192</span>';});
    html+='</div>';
  }
  if(treeNode.startsWith('res_')){
    const r=idResults[treeNode];
    html+=`<div class="tree-result"><h3>${r.name}</h3><p>${r.key}</p></div>`;
    html+=`<button class="back-btn" onclick="resetTree()" style="margin-top:16px">\u2190 Start Over</button>`;
  } else {
    const node=idTree[treeNode];
    html+=`<div class="tree-step"><h3>${node.q}</h3><div class="tree-opts">`;
    node.opts.forEach(o=>{html+=`<button class="tree-btn" onclick="treeSelect('${o.next}','${o.label.replace(/'/g,"\\'")}')"><span>${o.label}</span></button>`;});
    html+='</div></div>';
    if(treePath.length>0) html+=`<button class="back-btn" onclick="treeBack()">\u2190 Back</button>`;
  }
  el.innerHTML=html;
}
let treeHistory=[];
function treeSelect(next,label){treeHistory.push(treeNode);treePath.push(label);treeNode=next;renderIDTree();}
function treeBack(){if(treeHistory.length>0){treeNode=treeHistory.pop();treePath.pop();renderIDTree();}}
function resetTree(){treeNode='root';treePath=[];treeHistory=[];renderIDTree();}

function calcCFU(){
  const c=parseFloat(document.getElementById('cfuColonies').value);
  const d=parseFloat(document.getElementById('cfuDilution').value);
  const v=parseFloat(document.getElementById('cfuVolume').value);
  const el=document.getElementById('cfuResult');
  if(c>=0&&d>0&&v>0){const r=c/(d*v);el.textContent=`${r.toLocaleString()} CFU/mL`;}
  else el.textContent='Enter valid values';
}
function calcMag(){
  const oc=parseFloat(document.getElementById('magOcular').value);
  const ob=parseFloat(document.getElementById('magObj').value);
  const el=document.getElementById('magResult');
  if(oc>0&&ob>0) el.textContent=`Total Magnification: ${oc*ob}x`;
  else el.textContent='Enter values';
}
function calcDil(){
  const c1=parseFloat(document.getElementById('dilC1').value);
  const v1=parseFloat(document.getElementById('dilV1').value);
  const c2=parseFloat(document.getElementById('dilC2').value);
  const el=document.getElementById('dilResult');
  if(c1>0&&v1>0&&c2>0){const v2=(c1*v1)/c2;el.textContent=`V2 = ${v2.toFixed(2)} mL`;}
  else el.textContent='Enter C1, V1, and C2 to find V2';
}

function initQuiz(){

function renderQuiz(){
  if(quizQs.length===0){document.getElementById('quizBox').innerHTML='<h3>No questions available</h3>';return;}
  if(quizIndex>=quizQs.length){
    const pct=quizScore/quizQs.length;
    document.getElementById('quizBox').innerHTML=`<h3>Quiz Complete!</h3><p style="font-size:1.5rem;margin:20px 0;color:var(--green)">${quizScore} / ${quizQs.length}</p><p style="color:var(--muted);margin-bottom:20px">${pct>=.8?'Excellent work!':pct>=.6?'Good job! Keep studying':'Keep practicing! You got this'}</p><button class="btn-shuffle" onclick="initQuiz()">Try Again</button>`;
    document.getElementById('qProgress').style.width='100%';
    return;
  }
  const q=quizQs[quizIndex];
  document.getElementById('qNum').textContent=quizIndex+1;
  document.getElementById('qScore').textContent=quizScore;
  document.getElementById('qProgress').style.width=`${(quizIndex/quizQs.length)*100}%`;
  quizAnswered=false;
  document.getElementById('quizBox').innerHTML=`<h3>${q.q}</h3><div class="quiz-options">${q.options.map(opt=>`<button class="quiz-option" onclick="answerQuiz(this,'${esc(opt)}','${esc(q.correct)}')">${opt}</button>`).join('')}</div>`;
}
function esc(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function answerQuiz(el,selected,correct){
  if(quizAnswered)return;
  quizAnswered=true;
  const corr=correct.replace(/&quot;/g,'"').replace(/\\'/g,"'").replace(/\\\\/g,'\\');
  document.querySelectorAll('.quiz-option').forEach(o=>{
    if(o.textContent===corr)o.classList.add('correct');
    if(o===el&&o.textContent!==corr)o.classList.add('wrong');
    o.style.pointerEvents='none';
  });
  if(selected===correct)quizScore++;
  setTimeout(()=>{quizIndex++;renderQuiz()},1200);
}

let audioCtx=null;
function playTimerBeep(){
  if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  const now=audioCtx.currentTime;
  // 3 seconds of repeating beeps (beep on/off pattern)
  for(let i=0;i<6;i++){
    const osc=audioCtx.createOscillator();
    const gain=audioCtx.createGain();
    osc.connect(gain);gain.connect(audioCtx.destination);
    osc.frequency.value=i%2===0?880:660;
    osc.type='sine';
    gain.gain.value=0.3;
    osc.start(now+i*0.5);
    osc.stop(now+i*0.5+0.35);
  }
}
function renderTimers(){
  document.getElementById('timersContent').innerHTML=
    '<div style="max-width:560px;margin:0 auto"><div class="sectitle">Lab Timers</div>'+
    timers.map((t,i)=>{
      const p=(t.r/t.d)*100;
      return '<div class="trow"><div style="flex:1">'+
        '<div class="tnm">'+t.n+'</div>'+
        '<div class="tdisp" style="color:'+(t.r===0?'var(--green)':t.on?'var(--accent)':'var(--text)')+'">'+Math.floor(t.r/60)+':'+(t.r%60).toString().padStart(2,'0')+'</div>'+
        '<div style="height:3px;background:var(--border);border-radius:2px;margin-top:4px"><div style="width:'+p+'%;height:100%;background:'+(t.r===0?'var(--green)':'var(--accent)')+';border-radius:2px;transition:width 1s"></div></div>'+
        '</div><div class="tbtns">'+
        '<button class="tbtn '+(t.on?'tbtn-pause':'tbtn-go')+'" onclick="togT('+i+')">'+(t.on?'Pause':'Start')+'</button>'+
        '<button class="tbtn tbtn-rst" onclick="rstT('+i+')">Reset</button>'+
        '</div></div>';
    }).join('')+'</div>';
}
function togT(i){
  const t=timers[i];
  if(t.on){clearInterval(t.iv);t.on=false;}
  else{t.on=true;t.iv=setInterval(()=>{if(t.r<=0){clearInterval(t.iv);t.on=false;playTimerBeep();}else t.r--;renderTimers();},1000);}
  renderTimers();
}
function rstT(i){clearInterval(timers[i].iv);timers[i].r=timers[i].d;timers[i].on=false;renderTimers();}

function renderAbx(){
  const cols=["Organism","PEN","AMP","OXA","VAN","Ceph1","Ceph3","Macrolide","FQ","TMP-SMX","Doxy"];
  const keys=["org","pen","amp","oxa","van","ceph1","ceph3","macr","flu","tmp","dox"];
  function fmt(v){
    if(v==="S")return '<span class="abx-s">S</span>';
    if(v==="R")return '<span class="abx-r">R</span>';
    if(v==="V")return '<span class="abx-v">V</span>';
    return '<span style="color:var(--muted)">-</span>';
  }
  document.getElementById('abxContent').innerHTML=
    '<div class="sectitle">Antibiotic Sensitivity Chart</div>'+
    '<p style="color:var(--muted);margin-bottom:8px;font-size:.85rem"><span class="abx-s">S</span> = Sensitive &nbsp; <span class="abx-r">R</span> = Resistant &nbsp; <span class="abx-v">V</span> = Variable/Some resistance &nbsp; <span style="color:var(--muted)">-</span> = Not applicable/Not first-line</p>'+
    '<p style="color:var(--muted);margin-bottom:16px;font-size:.8rem;font-style:italic">Simplified reference chart. Always check local antibiograms for clinical decisions.</p>'+
    '<div style="overflow-x:auto"><table class="abx-table"><thead><tr>'+cols.map(c=>'<th>'+c+'</th>').join('')+'</tr></thead><tbody>'+
    abxData.map(row=>'<tr>'+keys.map((k,i)=>i===0?'<td><strong style="color:var(--text)">'+row[k]+'</strong></td>':'<td>'+fmt(row[k])+'</td>').join('')+'</tr>').join('')+
    '</tbody></table></div>';
}
