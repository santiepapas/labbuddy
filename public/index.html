<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LabBuddy — Microbiology Study Companion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--surface:#1e293b;--card:#334155;--accent:#6366f1;--accent2:#818cf8;--green:#22c55e;--red:#ef4444;--yellow:#eab308;--text:#f8fafc;--muted:#94a3b8;--border:#475569}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:900px;margin:0 auto;padding:16px}
header{text-align:center;padding:24px 0 16px}
header h1{font-size:2rem;background:linear-gradient(135deg,var(--accent),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:var(--muted);margin-top:4px;font-size:.95rem}
nav{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:16px 0;padding:8px;background:var(--surface);border-radius:12px}
nav button{padding:10px 16px;border:none;border-radius:8px;background:transparent;color:var(--muted);cursor:pointer;font-size:.9rem;font-weight:500;transition:.2s}
nav button:hover{color:var(--text);background:var(--card)}
nav button.active{background:var(--accent);color:#fff}
.section{display:none;animation:fadeIn .3s}
.section.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.card{background:var(--surface);border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid var(--border)}
.card h3{color:var(--accent2);margin-bottom:8px;font-size:1.1rem}
.card p,.card li{color:var(--muted);line-height:1.6;font-size:.93rem}
.card ul{padding-left:20px;margin-top:6px}
.search-box{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--text);font-size:1rem;margin-bottom:16px;outline:none}
.search-box:focus{border-color:var(--accent)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.org-card{background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border);cursor:pointer;transition:.2s}
.org-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.org-card h4{color:var(--accent2);font-size:1rem}
.org-card .type{font-size:.75rem;color:var(--green);background:rgba(34,197,94,.15);padding:2px 8px;border-radius:4px;display:inline-block;margin:4px 0}
.org-card p{color:var(--muted);font-size:.85rem;margin-top:4px}
.detail-view{background:var(--surface);border-radius:12px;padding:24px;border:1px solid var(--border)}
.detail-view h2{color:var(--accent2);margin-bottom:4px}
.detail-view .badge{display:inline-block;font-size:.8rem;padding:2px 10px;border-radius:6px;margin:4px 4px 12px 0}
.detail-view table{width:100%;border-collapse:collapse;margin:12px 0}
.detail-view th,.detail-view td{text-align:left;padding:8px 12px;border-bottom:1px solid var(--border);font-size:.9rem}
.detail-view th{color:var(--accent2);font-weight:600}
.detail-view td{color:var(--muted)}
.back-btn{background:var(--card);color:var(--text);border:none;padding:8px 16px;border-radius:8px;cursor:pointer;margin-bottom:16px;font-size:.9rem}
.back-btn:hover{background:var(--accent)}
.quiz-box{text-align:center;padding:20px}
.quiz-box h3{font-size:1.2rem;margin-bottom:20px;color:var(--text)}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:600px;margin:0 auto}
.quiz-option{padding:14px;border:2px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);cursor:pointer;font-size:.95rem;transition:.2s;text-align:left}
.quiz-option:hover{border-color:var(--accent)}
.quiz-option.correct{border-color:var(--green);background:rgba(34,197,94,.15)}
.quiz-option.wrong{border-color:var(--red);background:rgba(239,68,68,.15)}
.score-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:var(--surface);border-radius:10px;margin-bottom:16px}
.score-bar span{font-size:.95rem;color:var(--muted)}
.score-bar .score{color:var(--green);font-weight:700;font-size:1.1rem}
.progress-bar{height:6px;background:var(--card);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:3px;transition:width .3s}
.flashcard{background:linear-gradient(135deg,var(--surface),var(--card));border-radius:16px;padding:40px;text-align:center;min-height:250px;display:flex;flex-direction:column;justify-content:center;align-items:center;cursor:pointer;border:2px solid var(--border);transition:.3s;position:relative;user-select:none}
.flashcard:hover{border-color:var(--accent)}
.flashcard .label{position:absolute;top:12px;left:16px;font-size:.75rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px}
.flashcard .content{font-size:1.3rem;line-height:1.5}
.flashcard .hint{position:absolute;bottom:12px;font-size:.8rem;color:var(--muted)}
.fc-controls{display:flex;gap:10px;justify-content:center;margin-top:16px}
.fc-controls button{padding:10px 24px;border:none;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:500}
.btn-prev,.btn-next{background:var(--card);color:var(--text)}
.btn-prev:hover,.btn-next:hover{background:var(--accent)}
.btn-shuffle{background:var(--accent);color:#fff}
.category-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.category-filter button{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;font-size:.82rem;transition:.2s}
.category-filter button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.aa-table{width:100%;border-collapse:collapse}
.aa-table th{background:var(--card);color:var(--accent2);padding:10px 12px;text-align:left;font-size:.85rem;position:sticky;top:0}
.aa-table td{padding:8px 12px;border-bottom:1px solid var(--border);font-size:.88rem;color:var(--muted)}
.aa-table tr:hover td{background:rgba(99,102,241,.08)}
.aa-code{font-family:'Courier New',monospace;color:var(--green);font-weight:600}
.tab-bar{display:flex;gap:4px;margin-bottom:16px}
.tab-bar button{padding:8px 16px;border:none;border-radius:8px 8px 0 0;background:var(--card);color:var(--muted);cursor:pointer;font-size:.88rem}
.tab-bar button.active{background:var(--accent);color:#fff}
.na-card{background:var(--surface);border-radius:10px;padding:16px;border:1px solid var(--border);margin-bottom:10px}
.na-card h4{color:var(--accent2);font-size:.95rem}
.na-card .struct{color:var(--green);font-size:.85rem;margin:4px 0}
.na-card p{color:var(--muted);font-size:.85rem}
@media(max-width:600px){.quiz-options{grid-template-columns:1fr}.grid{grid-template-columns:1fr}header h1{font-size:1.5rem}nav button{padding:8px 12px;font-size:.82rem}}
</style>
</head>
<body>
<div class="app">
<header>
<h1>🔬 LabBuddy</h1>
<p>Microbiology Study Companion — Organisms · Amino Acids · Nucleic Acids · Flashcards · Quizzes</p>
</header>
<nav id="mainNav">
<button class="active" onclick="showSection('organisms')">Organisms</button>
<button onclick="showSection('amino')">Amino Acids</button>
<button onclick="showSection('nucleic')">Nucleic Acids</button>
<button onclick="showSection('flashcards')">Flashcards</button>
<button onclick="showSection('quiz')">Quiz</button>
</nav>

<div id="organisms" class="section active">
<input type="text" class="search-box" placeholder="Search organisms..." oninput="filterOrganisms(this.value)">
<div class="category-filter" id="orgFilter"></div>
<div class="grid" id="orgGrid"></div>
<div class="detail-view" id="orgDetail" style="display:none"></div>
</div>

<div id="amino" class="section">
<input type="text" class="search-box" placeholder="Search amino acids..." oninput="filterAA(this.value)">
<div class="category-filter" id="aaFilter"></div>
<div style="overflow-x:auto"><table class="aa-table" id="aaTable"><thead><tr><th>Name</th><th>3-Letter</th><th>1-Letter</th><th>Type</th><th>Key Feature</th></tr></thead><tbody></tbody></table></div>
</div>

<div id="nucleic" class="section">
<div class="tab-bar" id="naTab">
<button class="active" onclick="showNATab('dna')">DNA</button>
<button onclick="showNATab('rna')">RNA</button>
<button onclick="showNATab('compare')">Compare</button>
</div>
<div id="naContent"></div>
</div>

<div id="flashcards" class="section">
<div class="category-filter" id="fcFilter"></div>
<div class="score-bar"><span id="fcCount">Card 1 of 1</span><span class="score" id="fcCat"></span></div>
<div class="flashcard" id="flashcard" onclick="flipCard()">
<div class="label" id="fcLabel">Term</div>
<div class="content" id="fcContent">Loading...</div>
<div class="hint">Click to flip</div>
</div>
<div class="fc-controls">
<button class="btn-prev" onclick="prevCard()">← Prev</button>
<button class="btn-shuffle" onclick="shuffleCards()">Shuffle</button>
<button class="btn-next" onclick="nextCard()">Next →</button>
</div>
</div>

<div id="quiz" class="section">
<div class="category-filter" id="quizFilter"></div>
<div class="score-bar">
<span>Question <span id="qNum">1</span> of <span id="qTotal">10</span></span>
<span class="score">Score: <span id="qScore">0</span></span>
</div>
<div class="progress-bar"><div class="progress-fill" id="qProgress" style="width:0%"></div></div>
<div class="quiz-box" id="quizBox"></div>
</div>
</div>

<script>
// ── DATA ──
const organisms = [
  {name:"Staphylococcus aureus",type:"Gram+ Cocci",gram:"positive",morphology:"Clusters",diseases:["Skin infections","Endocarditis","Osteomyelitis","Toxic Shock Syndrome","Food poisoning"],virulence:["Coagulase","Protein A","Hemolysins","TSST-1","Enterotoxins"],lab:"Catalase +, Coagulase +, Gold colonies on MSA",treatment:"Nafcillin/Oxacillin (MSSA); Vancomycin (MRSA)",notes:"Most common cause of skin/soft tissue infections. MRSA is a major nosocomial pathogen."},
  {name:"Streptococcus pyogenes",type:"Gram+ Cocci",gram:"positive",morphology:"Chains",diseases:["Pharyngitis","Scarlet fever","Cellulitis","Necrotizing fasciitis","Rheumatic fever","Glomerulonephritis"],virulence:["M protein","Streptolysin O/S","Hyaluronidase","Streptokinase","DNase"],lab:"Catalase −, Beta-hemolytic, Bacitracin sensitive, PYR +",treatment:"Penicillin (no resistance reported)",notes:"Group A Strep (GAS). Post-infectious sequelae include rheumatic fever and PSGN."},
  {name:"Streptococcus pneumoniae",type:"Gram+ Cocci",gram:"positive",morphology:"Diplococci (lancet-shaped)",diseases:["Pneumonia","Meningitis","Otitis media","Sinusitis"],virulence:["Polysaccharide capsule","IgA protease","Pneumolysin","Adhesins"],lab:"Catalase −, Alpha-hemolytic, Optochin sensitive, Bile soluble",treatment:"Penicillin / Ceftriaxone; Vancomycin for resistant strains",notes:"#1 cause of community-acquired pneumonia, meningitis in adults, otitis media in children."},
  {name:"Escherichia coli",type:"Gram− Rods",gram:"negative",morphology:"Rods",diseases:["UTI","Neonatal meningitis","Traveler's diarrhea","Hemolytic Uremic Syndrome (EHEC)","Sepsis"],virulence:["LPS (endotoxin)","Type 1 pili","K1 capsule","Shiga-like toxin (EHEC)","Heat-labile/stable toxins (ETEC)"],lab:"Lactose fermenter, Indole +, Green sheen on EMB agar",treatment:"TMP-SMX or fluoroquinolones for UTI; supportive for EHEC (no antibiotics)",notes:"Most common cause of UTI. Multiple pathotypes: ETEC, EHEC, EPEC, EIEC, EAEC."},
  {name:"Neisseria meningitidis",type:"Gram− Cocci",gram:"negative",morphology:"Diplococci (kidney-bean shaped)",diseases:["Meningococcemia","Meningitis","Waterhouse-Friderichsen syndrome"],virulence:["Polysaccharide capsule","LPS","IgA protease","Pili"],lab:"Oxidase +, Maltose and Glucose fermenter, Grows on Thayer-Martin/chocolate agar",treatment:"Ceftriaxone + Dexamethasone; Rifampin prophylaxis for close contacts",notes:"Causes epidemic meningitis. Vaccine available for serogroups A, C, W, Y, B."},
  {name:"Mycobacterium tuberculosis",type:"Acid-Fast Bacilli",gram:"neither",morphology:"Rods (acid-fast)",diseases:["Pulmonary TB","Miliary TB","Pott disease","TB meningitis"],virulence:["Mycolic acid (cord factor)","Sulfatides","LAM"],lab:"Acid-fast (Ziehl-Neelsen), Lowenstein-Jensen agar, slow grower (weeks)",treatment:"RIPE: Rifampin, Isoniazid, Pyrazinamide, Ethambutol",notes:"Leading infectious killer worldwide. Granulomas with caseating necrosis. PPD/IGRA for screening."},
  {name:"Clostridium difficile",type:"Gram+ Rods",gram:"positive",morphology:"Rods (spore-forming, anaerobic)",diseases:["Antibiotic-associated diarrhea","Pseudomembranous colitis","Toxic megacolon"],virulence:["Toxin A (enterotoxin)","Toxin B (cytotoxin)","Spores"],lab:"Toxin assay (ELISA or PCR), Anaerobic culture",treatment:"Oral Vancomycin or Fidaxomicin; Fecal transplant for recurrent",notes:"Triggered by antibiotic use (clindamycin, fluoroquinolones, ampicillin). Spores persist in environment."},
  {name:"Pseudomonas aeruginosa",type:"Gram− Rods",gram:"negative",morphology:"Rods",diseases:["Pneumonia (CF/ventilator)","Burn wound infections","Otitis externa","UTI (catheter)","Sepsis"],virulence:["Exotoxin A","Elastase","Phospholipase C","Pyocyanin","Biofilm","LPS"],lab:"Oxidase +, Non-lactose fermenter, Blue-green pigment, Grape-like odor, Grows at 42°C",treatment:"Anti-pseudomonal beta-lactams (piperacillin-tazobactam, cefepime, meropenem) + aminoglycoside",notes:"Opportunistic. Intrinsically resistant to many antibiotics. Common in CF, burns, ICU patients."},
  {name:"Candida albicans",type:"Fungi",gram:"N/A",morphology:"Yeast with pseudohyphae and true hyphae",diseases:["Oral thrush","Vulvovaginal candidiasis","Esophageal candidiasis","Candidemia","Diaper rash"],virulence:["Adhesins","Biofilm formation","Phenotypic switching","Secreted aspartyl proteases","Hyphae formation"],lab:"Germ tube +, Grows on Sabouraud agar, Chlamydospores on cornmeal agar",treatment:"Fluconazole (mucosal); Echinocandins or Amphotericin B (systemic)",notes:"Most common fungal infection in immunocompromised. Dimorphic at 37°C."},
  {name:"Neisseria gonorrhoeae",type:"Gram− Cocci",gram:"negative",morphology:"Diplococci (kidney-bean shaped, intracellular)",diseases:["Gonorrhea (urethritis, cervicitis)","PID","Disseminated gonococcal infection","Neonatal ophthalmia"],virulence:["Pili (antigenic variation)","Opa proteins","LOS","IgA protease","Beta-lactamase"],lab:"Oxidase +, Glucose fermenter only (not maltose), Thayer-Martin agar, Intracellular diplococci on Gram stain",treatment:"Ceftriaxone 500mg IM (single dose) + treat for Chlamydia if not ruled out",notes:"Sexually transmitted. No vaccine due to antigenic variation. Increasing antibiotic resistance."},
  {name:"Salmonella enterica",type:"Gram− Rods",gram:"negative",morphology:"Rods (flagellated)",diseases:["Gastroenteritis","Typhoid fever (S. typhi)","Bacteremia","Osteomyelitis (sickle cell)"],virulence:["Vi capsule (S. typhi)","LPS","Type III secretion system","Flagella"],lab:"Non-lactose fermenter, H₂S + on TSI, Grows on Hektoen/XLD agar",treatment:"Fluoroquinolones or Ceftriaxone for typhoid; Supportive for gastroenteritis",notes:"Spread through contaminated food/water. Typhoid has rose spots, relative bradycardia. Chronic carriers (gallbladder)."},
  {name:"Clostridioides (Clostridium) botulinum",type:"Gram+ Rods",gram:"positive",morphology:"Rods (spore-forming, anaerobic)",diseases:["Botulism (foodborne, infant, wound)","Floppy baby syndrome"],virulence:["Botulinum toxin (blocks ACh release at NMJ)"],lab:"Mouse bioassay, Toxin detection in serum/stool",treatment:"Antitoxin; supportive (ventilation); do NOT give antibiotics for infant botulism",notes:"Descending flaccid paralysis. Honey is a risk for infants. Toxin used therapeutically (Botox)."}
];

const aminoAcids = [
  {name:"Glycine",three:"Gly",one:"G",type:"Nonpolar",feature:"Smallest AA; fits tight spaces (collagen)"},
  {name:"Alanine",three:"Ala",one:"A",type:"Nonpolar",feature:"Simple hydrophobic side chain"},
  {name:"Valine",three:"Val",one:"V",type:"Nonpolar",feature:"Branched-chain AA (BCAA); essential"},
  {name:"Leucine",three:"Leu",one:"L",type:"Nonpolar",feature:"BCAA; most abundant in proteins; essential"},
  {name:"Isoleucine",three:"Ile",one:"I",type:"Nonpolar",feature:"BCAA; essential"},
  {name:"Proline",three:"Pro",one:"P",type:"Nonpolar",feature:"Cyclic; causes kinks in protein chains"},
  {name:"Phenylalanine",three:"Phe",one:"F",type:"Nonpolar",feature:"Aromatic; precursor to Tyr; essential. Accumulates in PKU"},
  {name:"Tryptophan",three:"Trp",one:"W",type:"Nonpolar",feature:"Largest AA; precursor to serotonin/melatonin/niacin; essential"},
  {name:"Methionine",three:"Met",one:"M",type:"Nonpolar",feature:"Start codon (AUG); methyl donor as SAM; essential"},
  {name:"Cysteine",three:"Cys",one:"C",type:"Polar",feature:"Thiol group forms disulfide bonds"},
  {name:"Serine",three:"Ser",one:"S",type:"Polar",feature:"Phosphorylation site; active site of serine proteases"},
  {name:"Threonine",three:"Thr",one:"T",type:"Polar",feature:"Phosphorylation site; essential"},
  {name:"Tyrosine",three:"Tyr",one:"Y",type:"Polar",feature:"Phosphorylation site; precursor to dopamine, thyroid hormones, melanin"},
  {name:"Asparagine",three:"Asn",one:"N",type:"Polar",feature:"N-linked glycosylation site"},
  {name:"Glutamine",three:"Gln",one:"Q",type:"Polar",feature:"Nitrogen carrier; most abundant AA in blood"},
  {name:"Aspartate",three:"Asp",one:"D",type:"Negative",feature:"Acidic; important in urea cycle"},
  {name:"Glutamate",three:"Glu",one:"E",type:"Negative",feature:"Acidic; major excitatory neurotransmitter; flavor (umami)"},
  {name:"Lysine",three:"Lys",one:"K",type:"Positive",feature:"Basic; important for collagen cross-linking; essential"},
  {name:"Arginine",three:"Arg",one:"R",type:"Positive",feature:"Most basic AA; substrate for NO synthase; essential in children"},
  {name:"Histidine",three:"His",one:"H",type:"Positive",feature:"Imidazole ring; buffering at physiological pH; essential"}
];

const nucleicData = {
  dna:[
    {title:"Structure",info:"Double-stranded helix. Sugar: Deoxyribose. Bases: A, T, G, C. Anti-parallel strands (5'→3' and 3'→5'). A=T (2 H-bonds), G≡C (3 H-bonds)."},
    {title:"Replication",info:"Semi-conservative. Helicase unwinds, SSB stabilizes, Primase lays RNA primer, DNA Pol III extends (5'→3'), DNA Pol I replaces primers, Ligase seals nicks. Leading strand = continuous, Lagging strand = Okazaki fragments."},
    {title:"Forms",info:"B-DNA: most common, right-handed. A-DNA: right-handed, dehydrated. Z-DNA: left-handed, zigzag backbone."},
    {title:"Damage & Repair",info:"Mismatch repair: fixes replication errors. Base excision repair (BER): removes single damaged bases. Nucleotide excision repair (NER): removes bulky lesions/thymine dimers (defective in Xeroderma Pigmentosum)."}
  ],
  rna:[
    {title:"Types of RNA",info:"mRNA: carries code from DNA to ribosome. tRNA: carries amino acids, has anticodon. rRNA: structural/catalytic component of ribosomes. snRNA: splicing. miRNA/siRNA: gene regulation."},
    {title:"Transcription",info:"RNA Polymerase reads template 3'→5', synthesizes mRNA 5'→3'. Prokaryotes: single RNA Pol, no processing. Eukaryotes: RNA Pol II for mRNA. Promoters: TATA box (eukaryotes), Pribnow box (prokaryotes)."},
    {title:"mRNA Processing (Eukaryotes)",info:"5' cap (7-methylguanosine) — protects from degradation, aids ribosome binding. Poly-A tail (3') — protects, aids export. Splicing — introns removed by spliceosome (snRNPs). Exons are expressed."},
    {title:"Translation",info:"Initiation: small subunit + mRNA + initiator tRNA (AUG = Met). Elongation: aminoacyl-tRNA enters A site, peptide bond, translocation. Termination: stop codon (UAA, UAG, UGA) → release factor."}
  ],
  compare:[
    {feature:"Sugar",dna:"Deoxyribose",rna:"Ribose"},
    {feature:"Bases",dna:"A, T, G, C",rna:"A, U, G, C"},
    {feature:"Strands",dna:"Double-stranded",rna:"Usually single-stranded"},
    {feature:"Location",dna:"Nucleus (mainly)",rna:"Nucleus and cytoplasm"},
    {feature:"Function",dna:"Stores genetic information",rna:"Transfers and expresses genetic info"},
    {feature:"Stability",dna:"Very stable",rna:"Less stable (OH on 2' carbon)"},
    {feature:"Replication",dna:"Self-replicating",rna:"Transcribed from DNA"}
  ]
};

// ── FLASHCARDS DATA ──
let flashcards = [];
function buildFlashcards(){
  flashcards = [];
  organisms.forEach(o=>{
    flashcards.push({cat:"Organisms",q:o.name,a:`${o.type} | ${o.morphology}\nDiseases: ${o.diseases.slice(0,3).join(", ")}\nLab: ${o.lab}\nTx: ${o.treatment}`});
  });
  aminoAcids.forEach(a=>{
    flashcards.push({cat:"Amino Acids",q:`${a.name} (${a.three}/${a.one})`,a:`Type: ${a.type}\n${a.feature}`});
  });
  nucleicData.dna.forEach(d=>{flashcards.push({cat:"Nucleic Acids",q:`DNA: ${d.title}`,a:d.info});});
  nucleicData.rna.forEach(r=>{flashcards.push({cat:"Nucleic Acids",q:`RNA: ${r.title}`,a:r.info});});
}
buildFlashcards();

// ── QUIZ DATA ──
function buildQuizQuestions(){
  const qs=[];
  organisms.forEach(o=>{
    qs.push({cat:"Organisms",q:`Which organism is described: "${o.lab}"?`,correct:o.name,options:getRandomOptions(organisms.map(x=>x.name),o.name,3)});
    qs.push({cat:"Organisms",q:`What is the treatment for ${o.name}?`,correct:o.treatment,options:getRandomOptions(organisms.map(x=>x.treatment),o.treatment,3)});
    if(o.diseases.length>0){qs.push({cat:"Organisms",q:`${o.name} causes which of the following?`,correct:o.diseases[0],options:getRandomOptions(organisms.flatMap(x=>x.diseases),o.diseases[0],3)});}
  });
  aminoAcids.forEach(a=>{
    qs.push({cat:"Amino Acids",q:`What is the one-letter code for ${a.name}?`,correct:a.one,options:getRandomOptions(aminoAcids.map(x=>x.one),a.one,3)});
    qs.push({cat:"Amino Acids",q:`${a.name} is classified as:`,correct:a.type,options:getRandomOptions(["Nonpolar","Polar","Positive","Negative"],a.type,3)});
  });
  return qs;
}
function getRandomOptions(pool,correct,count){
  const filtered=[...new Set(pool.filter(x=>x!==correct))];
  const shuffled=filtered.sort(()=>Math.random()-.5).slice(0,count);
  const options=[correct,...shuffled].sort(()=>Math.random()-.5);
  return options;
}

// ── NAVIGATION ──
function showSection(id){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('#mainNav button').forEach(b=>b.classList.remove('active'));
  [...document.querySelectorAll('#mainNav button')].find(b=>b.textContent.toLowerCase().includes(id.substring(0,4)))?.classList.add('active');
  if(id==='organisms'){renderOrganisms();document.getElementById('orgDetail').style.display='none';document.getElementById('orgGrid').style.display='';}
  if(id==='amino')renderAminoAcids();
  if(id==='nucleic')showNATab('dna');
  if(id==='flashcards')initFlashcards();
  if(id==='quiz')initQuiz();
}

// ── ORGANISMS ──
let orgCatFilter='All';
function renderOrganisms(search=''){
  const types=['All',...new Set(organisms.map(o=>o.type))];
  document.getElementById('orgFilter').innerHTML=types.map(t=>`<button class="${t===orgCatFilter?'active':''}" onclick="orgCatFilter='${t}';renderOrganisms(document.querySelector('#organisms .search-box').value)">${t}</button>`).join('');
  const filtered=organisms.filter(o=>{
    const matchSearch=o.name.toLowerCase().includes(search.toLowerCase())||o.type.toLowerCase().includes(search.toLowerCase())||o.diseases.some(d=>d.toLowerCase().includes(search.toLowerCase()));
    const matchCat=orgCatFilter==='All'||o.type===orgCatFilter;
    return matchSearch&&matchCat;
  });
  document.getElementById('orgGrid').innerHTML=filtered.map((o,i)=>`<div class="org-card" onclick="showOrgDetail(${organisms.indexOf(o)})"><h4>${o.name}</h4><span class="type">${o.type}</span><p>${o.diseases.slice(0,2).join(', ')}</p></div>`).join('')||'<p style="color:var(--muted);text-align:center;padding:40px">No organisms found.</p>';
}
function filterOrganisms(v){renderOrganisms(v)}
function showOrgDetail(i){
  const o=organisms[i];
  document.getElementById('orgGrid').style.display='none';
  document.getElementById('orgFilter').style.display='none';
  document.querySelector('#organisms .search-box').style.display='none';
  const d=document.getElementById('orgDetail');
  d.style.display='block';
  d.innerHTML=`<button class="back-btn" onclick="backToOrganisms()">← Back to list</button>
    <h2>${o.name}</h2>
    <span class="badge" style="background:${o.gram==='positive'?'rgba(99,102,241,.2);color:var(--accent2)':o.gram==='negative'?'rgba(239,68,68,.2);color:var(--red)':'rgba(234,179,8,.2);color:var(--yellow)'}">${o.type}</span>
    <span class="badge" style="background:rgba(34,197,94,.15);color:var(--green)">${o.morphology}</span>
    <table><tr><th>Diseases</th><td>${o.diseases.join(', ')}</td></tr>
    <tr><th>Virulence Factors</th><td>${o.virulence.join(', ')}</td></tr>
    <tr><th>Lab Identification</th><td>${o.lab}</td></tr>
    <tr><th>Treatment</th><td>${o.treatment}</td></tr>
    <tr><th>High-Yield Notes</th><td>${o.notes}</td></tr></table>`;
}
function backToOrganisms(){
  document.getElementById('orgDetail').style.display='none';
  document.getElementById('orgGrid').style.display='';
  document.getElementById('orgFilter').style.display='';
  document.querySelector('#organisms .search-box').style.display='';
}

// ── AMINO ACIDS ──
let aaCatFilter='All';
function renderAminoAcids(search=''){
  const types=['All','Nonpolar','Polar','Positive','Negative'];
  document.getElementById('aaFilter').innerHTML=types.map(t=>`<button class="${t===aaCatFilter?'active':''}" onclick="aaCatFilter='${t}';renderAminoAcids(document.querySelector('#amino .search-box').value)">${t}</button>`).join('');
  const filtered=aminoAcids.filter(a=>{
    const matchSearch=a.name.toLowerCase().includes(search.toLowerCase())||a.three.toLowerCase().includes(search.toLowerCase())||a.one.toLowerCase()===search.toLowerCase()||a.feature.toLowerCase().includes(search.toLowerCase());
    const matchCat=aaCatFilter==='All'||a.type===aaCatFilter;
    return matchSearch&&matchCat;
  });
  const tbody=document.querySelector('#aaTable tbody');
  tbody.innerHTML=filtered.map(a=>`<tr><td><strong style="color:var(--text)">${a.name}</strong></td><td class="aa-code">${a.three}</td><td class="aa-code">${a.one}</td><td>${a.type}</td><td>${a.feature}</td></tr>`).join('');
}
function filterAA(v){renderAminoAcids(v)}

// ── NUCLEIC ACIDS ──
let naTab='dna';
function showNATab(tab){
  naTab=tab;
  document.querySelectorAll('#naTab button').forEach(b=>b.classList.remove('active'));
  [...document.querySelectorAll('#naTab button')].find(b=>b.textContent.toLowerCase().includes(tab))?.classList.add('active');
  const c=document.getElementById('naContent');
  if(tab==='compare'){
    c.innerHTML=`<table class="aa-table"><thead><tr><th>Feature</th><th>DNA</th><th>RNA</th></tr></thead><tbody>${nucleicData.compare.map(r=>`<tr><td><strong style="color:var(--text)">${r.feature}</strong></td><td>${r.dna}</td><td>${r.rna}</td></tr>`).join('')}</tbody></table>`;
  } else {
    const data=nucleicData[tab];
    c.innerHTML=data.map(d=>`<div class="na-card"><h4>${d.title}</h4><p>${d.info}</p></div>`).join('');
  }
}

// ── FLASHCARDS ──
let fcIndex=0,fcFlipped=false,fcCat='All',fcDeck=[];
function initFlashcards(){
  const cats=['All','Organisms','Amino Acids','Nucleic Acids'];
  document.getElementById('fcFilter').innerHTML=cats.map(c=>`<button class="${c===fcCat?'active':''}" onclick="fcCat='${c}';initFlashcards()">${c}</button>`).join('');
  fcDeck=fcCat==='All'?[...flashcards]:flashcards.filter(f=>f.cat===fcCat);
  fcIndex=0;fcFlipped=false;
  renderFlashcard();
}
function renderFlashcard(){
  if(fcDeck.length===0){document.getElementById('fcContent').textContent='No cards available';return;}
  const card=fcDeck[fcIndex];
  document.getElementById('fcLabel').textContent=fcFlipped?'Answer':'Term';
  document.getElementById('fcContent').textContent=fcFlipped?card.a:card.q;
  document.getElementById('fcContent').style.whiteSpace='pre-line';
  document.getElementById('fcCount').textContent=`Card ${fcIndex+1} of ${fcDeck.length}`;
  document.getElementById('fcCat').textContent=card.cat;
}
function flipCard(){fcFlipped=!fcFlipped;renderFlashcard()}
function nextCard(){fcIndex=(fcIndex+1)%fcDeck.length;fcFlipped=false;renderFlashcard()}
function prevCard(){fcIndex=(fcIndex-1+fcDeck.length)%fcDeck.length;fcFlipped=false;renderFlashcard()}
function shuffleCards(){fcDeck.sort(()=>Math.random()-.5);fcIndex=0;fcFlipped=false;renderFlashcard()}

// ── QUIZ ──
let quizQs=[],quizIndex=0,quizScore=0,quizCat='All',quizAnswered=false;
function initQuiz(){
  const cats=['All','Organisms','Amino Acids'];
  document.getElementById('quizFilter').innerHTML=cats.map(c=>`<button class="${c===quizCat?'active':''}" onclick="quizCat='${c}';initQuiz()">${c}</button>`).join('');
  const all=buildQuizQuestions();
  quizQs=(quizCat==='All'?all:all.filter(q=>q.cat===quizCat)).sort(()=>Math.random()-.5).slice(0,15);
  quizIndex=0;quizScore=0;quizAnswered=false;
  document.getElementById('qTotal').textContent=quizQs.length;
  renderQuiz();
}
function renderQuiz(){
  if(quizQs.length===0){document.getElementById('quizBox').innerHTML='<h3>No questions available</h3>';return;}
  if(quizIndex>=quizQs.length){
    document.getElementById('quizBox').innerHTML=`<h3>Quiz Complete!</h3><p style="font-size:1.5rem;margin:20px 0;color:var(--green)">${quizScore} / ${quizQs.length}</p><p style="color:var(--muted);margin-bottom:20px">${quizScore/quizQs.length>=.8?'Excellent work! 🎉':quizScore/quizQs.length>=.6?'Good job! Keep studying 📖':'Keep practicing! You got this 💪'}</p><button class="btn-shuffle" onclick="initQuiz()">Try Again</button>`;
    return;
  }
  const q=quizQs[quizIndex];
  document.getElementById('qNum').textContent=quizIndex+1;
  document.getElementById('qScore').textContent=quizScore;
  document.getElementById('qProgress').style.width=`${(quizIndex/quizQs.length)*100}%`;
  quizAnswered=false;
  document.getElementById('quizBox').innerHTML=`<h3>${q.q}</h3><div class="quiz-options">${q.options.map((opt,i)=>`<button class="quiz-option" onclick="answerQuiz(this,'${esc(opt)}','${esc(q.correct)}')">${opt}</button>`).join('')}</div>`;
}
function esc(s){return s.replace(/'/g,"\\'").replace(/"/g,'&quot;')}
function answerQuiz(el,selected,correct){
  if(quizAnswered)return;
  quizAnswered=true;
  const opts=document.querySelectorAll('.quiz-option');
  opts.forEach(o=>{
    if(o.textContent===correct.replace(/&quot;/g,'"'))o.classList.add('correct');
    if(o===el&&o.textContent!==correct.replace(/&quot;/g,'"'))o.classList.add('wrong');
    o.style.pointerEvents='none';
  });
  if(selected===correct)quizScore++;
  setTimeout(()=>{quizIndex++;renderQuiz()},1200);
}

// ── INIT ──
renderOrganisms();
